### Host-specific Sway settings for laptop

output HDMI-A-2 scale 2.01
output HDMI-A-2 pos 0 0 res 3840x2160
# output eDP-1 pos 0 1080 res 1920x1080

# set $firstMonitor eDP-1
set $secondMonitor HDMI-A-2

workspace $workspace1  output $secondMonitor
workspace $workspace2  output $firstMonitor
workspace $workspace3  output $secondMonitor
workspace $workspace4  output $secondMonitor
workspace $workspace5  output $secondMonitor
workspace $workspace6  output $firstMonitor
workspace $workspace7  output $secondMonitor
workspace $workspace8  output $firstMonitor
workspace $workspace9  output $secondMonitor
workspace $workspace0  output $secondMonitor
workspace $workspace11 output $secondMonitor
workspace $workspace12 output $secondMonitor
workspace $workspace13 output $secondMonitor
workspace $workspace14 output $secondMonitor
workspace $workspace15 output $secondMonitor
workspace $workspace16 output $secondMonitor
workspace $workspace17 output $secondMonitor
workspace $workspace18 output $secondMonitor
workspace $workspace19 output $firstMonitor
workspace $workspace20 output $secondMonitor
workspace $workspace21 output $secondMonitor
workspace $workspace22 output $secondMonitor

exec_always sh -lc 'if [ -f "$HOME/Pictures/Wallpaper1.jpg" ]; then exec "$HOME/.local/bin/wallpaper" "$HOME/Pictures/Wallpaper1.jpg"; else exec "$HOME/.local/bin/wallpaper"; fi'

exec --no-startup-id sh -lc 'command -v kwalletd6 >/dev/null 2>&1 && exec kwalletd6'
exec --no-startup-id sh -lc 'command -v nm-applet >/dev/null 2>&1 && exec nm-applet'
exec --no-startup-id sh -lc '[ -x "$HOME/.local/bin/Nextcloud" ] && exec "$HOME/.local/bin/Nextcloud"'
exec --no-startup-id sh -lc 'command -v thunderbird >/dev/null 2>&1 && exec thunderbird'
exec --no-startup-id sh -lc '[ -x "$HOME/.local/bin/pcloud" ] && exec "$HOME/.local/bin/pcloud"'
exec --no-startup-id sh -lc '[ -x /usr/bin/indicator-sound-switcher ] && exec /usr/bin/indicator-sound-switcher'
